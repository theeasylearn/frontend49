<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>State Card</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-3">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        Andhra Pradesh
                    </div>

                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item"><strong>Area:</strong> 162975 km²</li>
                            <li class="list-group-item"><strong>Per Person Income:</strong> ₹207000</li>
                            <li class="list-group-item"><strong>Capital:</strong> Amaravati</li>
                            <li class="list-group-item"><strong>Language:</strong> Telugu</li>
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
