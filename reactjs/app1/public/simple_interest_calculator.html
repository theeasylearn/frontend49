<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple Interest Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h4>Simple Interest Calculator</h4>
                    </div>

                    <div class="card-body">

                        <form method="post">

                            <div class="mb-3">
                                <label class="form-label">Principal Amount</label>
                                <input type="number" name="principal" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Rate of Interest (%)</label>
                                <input type="number" name="rate" step="0.01" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Time (Years)</label>
                                <input type="number" name="time" step="0.01" class="form-control" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Calculate</button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
