<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-5">
                    <!-- Card -->
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">

                            <!-- Title with decorative lines -->
                            <div class="d-flex align-items-center mb-3">
                                <hr class="flex-grow-1 border-secondary">
                                <h1 class="mx-4 mb-0 fw-bold text-dark">Register</h1>
                                <hr class="flex-grow-1 border-secondary">
                            </div>

                            <!-- Subtitle -->
                            <p class="text-center text-muted mb-4">
                                Create your account. It's free and only takes a minute.
                            </p>

                            <!-- Form -->
                            <form>
                                <!-- First & Last Name -->
                                <div class="row g-3 mb-3">
                                    <div class="col-sm-6">
                                        <input type="text" class="form-control" placeholder="First Name" required>
                                    </div>
                                    <div class="col-sm-6">
                                        <input type="text" class="form-control" placeholder="Last Name" required>
                                    </div>
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <input type="email" class="form-control" placeholder="Email" required>
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <input type="password" class="form-control" placeholder="Password" required>
                                </div>

                                <!-- Confirm Password -->
                                <div class="mb-4">
                                    <input type="password" class="form-control" placeholder="Confirm Password" required>
                                </div>

                                <!-- Checkbox -->
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                    <label class="form-check-label text-muted" for="termsCheck">
                                        I accept the
                                        <a href="#" class="text-success text-decoration-none">Terms of Use</a>
                                        &amp;
                                        <a href="#" class="text-success text-decoration-none">Privacy Policy</a>
                                    </label>
                                </div>

                                <!-- Register Button -->
                                <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
                                    Register Now
                                </button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS (required for Bootstrap components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
