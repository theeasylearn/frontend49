<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMI Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   </head>
<body>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card bmi-card">

                    <div class="card-body p-4">

                        <h3 class="text-center mb-4">BMI Calculator</h3>

                        <form>

                            <div class="mb-3">
                                <label class="form-label">Gender</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender">
                                        <label class="form-check-label">Male</label>
                                    </div>

                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender">
                                        <label class="form-check-label">Female</label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" placeholder="Enter age">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Height (cm)</label>
                                <input type="number" class="form-control" placeholder="Enter height">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Weight (kg)</label>
                                <input type="number" class="form-control" placeholder="Enter weight">
                            </div>

                            <div class="d-grid mb-4">
                                <button class="btn btn-primary btn-lg">Calculate BMI</button>
                            </div>

                        </form>

                        <div class="result-box">

                            <h5>Your BMI</h5>

                            <h2 class="text-primary">--</h2>

                            <div class="bmi-scale mt-3">

                                <span class="badge bg-warning text-dark">Underweight</span>

                                <span class="badge bg-success">Normal</span>

                                <span class="badge bg-info text-dark">Overweight</span>

                                <span class="badge bg-danger">Obese</span>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
</body>

</html>
