<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Card - Fullstack React</title>

</head>

<body style="display: flex;justify-content: flex-start;gap: 20px; flex-wrap: wrap;">

    <div style="
  width: 380px;
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  padding: 24px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  font-size: 14px;
  color: #333;
">

        <!-- Title -->
        <div style="font-size: 20px; font-weight: 600; line-height: 1.35; margin-bottom: 8px;">
            Fullstack React: The Complete Guide to ReactJS and Friends
        </div>

        <!-- Authors -->
        <div style="color: #0066cc; margin-bottom: 12px; line-height: 1.4;">
            by
            <span style="font-weight: 500;">Anthony Accomazzo</span>
        </div>

        <!-- Rating -->
        <div style="margin: 14px 0; display: flex; align-items: center; gap: 8px;">
            <div style="color: #f1c40f; font-size: 20px; letter-spacing: 1px;">
                ★★★★★
            </div>
            <div style="font-size: 15px; font-weight: 500;">
                4.24 avg rating
            </div>
        </div>

        <!-- Buttons row -->
        <div style="display: flex; gap: 10px; margin: 20px 0 8px;">
            <!-- Want to Read dropdown -->
            <div style="
      position: relative;
      flex: 1;
    ">
                <button style="
        width: 100%;
        padding: 10px 16px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      ">
                    Want to Read ▾
                </button>
            </div>
        </div>



    </div>
</body>

</html>
