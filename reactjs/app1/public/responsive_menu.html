<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Responsive Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

    <nav class="navbar navbar-expand-lg  bg-body-tertiary shadow">
        <div class="container">
            <a class="navbar-brand" href="#">Shop</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu"
                aria-controls="mainMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 nav-pills">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Shop</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Trending Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold active text-white" href="#">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Change Password</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Forgot Password</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Logout</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Cart</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Checkout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
