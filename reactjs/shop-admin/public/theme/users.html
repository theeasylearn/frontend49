<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="author" content="AdminKit">
	<link rel="preconnect" href="https://fonts.gstatic.com/">
	<link rel="shortcut icon" href="img/icons/icon-48x48.png" />
	<title>Users</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
	<link href="css/light.css" rel="stylesheet">
</head>
<body>
	<div class="wrapper">
		<nav id="sidebar" class="sidebar js-sidebar"><div class="sidebar-content js-simplebar"><div class="p-3 text-white fw-semibold">Welcome Administrator</div><ul class="sidebar-nav"><li class="sidebar-item"><a class="sidebar-link" href="index.html">Dashboard</a></li><li class="sidebar-item"><a class="sidebar-link" href="category.html">Category</a></li><li class="sidebar-item"><a class="sidebar-link" href="product.html">Product</a></li><li class="sidebar-item active"><a class="sidebar-link" href="users.html">Users</a></li><li class="sidebar-item"><a class="sidebar-link" href="orders.html">Orders</a></li></ul></div></nav>
		<div class="main">
			<nav class="navbar navbar-expand navbar-light navbar-bg"><a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a></nav>
			<main class="content">
				<div class="container-fluid p-0">
					<h1 class="h3 mb-3">Users</h1>
					<div class="card">
						<div class="card-header text-bg-primary"><h3 class="mb-0 text-white">All Users</h3></div>
						<div class="card-body">
							<table class="table table-bordered table-striped mb-0">
								<thead><tr><th>ID</th><th>Email</th><th>Mobile</th><th>Status</th></tr></thead>
								<tbody></tbody>
							</table>
						</div>
					</div>
				</div>
			</main>
		</div>
	</div>
	<script src="js/app.js"></script>
	<script>
		const API_BASE = "https://theeasylearnacademy.com/shop/ws/";
		const tbody = document.querySelector("tbody");

		function toArray(payload) {
			if (Array.isArray(payload)) return payload;
			if (Array.isArray(payload.data)) return payload.data;
			if (Array.isArray(payload.records)) return payload.records;
			return [];
		}

		async function loadUsers() {
			tbody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";
			try {
				const res = await fetch(API_BASE + "users.php");
				const json = await res.json();
				const rows = toArray(json);
				if (!rows.length) {
					tbody.innerHTML = "<tr><td colspan='4'>No users found.</td></tr>";
					return;
				}
				tbody.innerHTML = rows.map((row) => `<tr>
					<td>${row.id || row.usersid || "-"}</td>
					<td>${row.email || "-"}</td>
					<td>${row.mobile || "-"}</td>
					<td>${row.status || "Active"}</td>
				</tr>`).join("");
			} catch (err) {
				tbody.innerHTML = `<tr><td colspan='4'>Failed to load users: ${err.message}</td></tr>`;
			}
		}

		loadUsers();
	</script>
</body>
</html>
