<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="author" content="AdminKit">
	<link rel="preconnect" href="https://fonts.gstatic.com/">
	<link rel="shortcut icon" href="img/icons/icon-48x48.png" />
	<title>Edit Product</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
	<link href="css/light.css" rel="stylesheet">
</head>
<body>
	<div class="wrapper">
		<nav id="sidebar" class="sidebar js-sidebar"><div class="sidebar-content js-simplebar"><div class="p-3 text-white fw-semibold">Welcome Administrator</div><ul class="sidebar-nav"><li class="sidebar-item"><a class="sidebar-link" href="index.html">Dashboard</a></li><li class="sidebar-item"><a class="sidebar-link" href="category.html">Category</a></li><li class="sidebar-item active"><a class="sidebar-link" href="product.html">Product</a></li><li class="sidebar-item"><a class="sidebar-link" href="users.html">Users</a></li><li class="sidebar-item"><a class="sidebar-link" href="orders.html">Orders</a></li></ul></div></nav>
		<div class="main">
			<nav class="navbar navbar-expand navbar-light navbar-bg"><a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a></nav>
			<main class="content">
				<div class="container-fluid p-0">
					<h1 class="h3 mb-3">Update Product</h1>
					<div class="card">
						<div class="card-header text-bg-primary"><h3 class="mb-0 text-white">Edit Product</h3></div>
						<div class="card-body">
							<form id="productForm">
								<div class="mb-3"><label class="form-label">Product ID</label><input type="text" class="form-control" name="productid" value="" readonly></div>
								<div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" name="name" value=""></div>
								<div class="mb-3"><label class="form-label">Photo</label><input type="file" class="form-control" name="photo"></div>
								<div class="row">
									<div class="col-md-6 mb-3"><label class="form-label">Price</label><input type="number" class="form-control" name="price" value=""></div>
									<div class="col-md-6 mb-3"><label class="form-label">Stock</label><input type="number" class="form-control" name="stock" value=""></div>
								</div>
								<div class="mb-3"><label class="form-label">Detail</label><textarea class="form-control" name="detail" rows="3"></textarea></div>
								<div class="row">
									<div class="col-md-6 mb-3"><label class="form-label">Category ID</label><input type="number" class="form-control" name="categoryid" value=""></div>
									<div class="col-md-6 mb-3"><label class="form-label">Is Live</label><select class="form-select" name="islive"><option value="1">1 - Live</option><option value="0">0 - Hidden</option></select></div>
								</div>
								<button type="submit" class="btn btn-primary">Update</button>
								<a href="product.html" class="btn btn-secondary">Cancel</a>
							</form>
							<div id="message" class="mt-3 small"></div>
						</div>
					</div>
				</div>
			</main>
		</div>
	</div>
	<script src="js/app.js"></script>
	<script>
		const API_BASE = "https://theeasylearnacademy.com/shop/ws/";
		const form = document.getElementById("productForm");
		const message = document.getElementById("message");
		const params = new URLSearchParams(window.location.search);
		const productid = params.get("productid");

		async function loadProduct() {
			if (!productid) return;
			try {
				const res = await fetch(API_BASE + "product.php?productid=" + encodeURIComponent(productid));
				const json = await res.json();
				const row = Array.isArray(json) ? json[0] : (Array.isArray(json.data) ? json.data[0] : json);
				if (!row) return;
				form.elements.productid.value = row.productid || row.id || productid;
				form.elements.name.value = row.name || "";
				form.elements.price.value = row.price || "";
				form.elements.stock.value = row.stock || "";
				form.elements.detail.value = row.detail || "";
				form.elements.categoryid.value = row.categoryid || "";
				form.elements.islive.value = String(row.islive ?? "1");
			} catch (err) {
				message.textContent = "Load failed: " + err.message;
				message.className = "mt-3 small text-danger";
			}
		}

		form.addEventListener("submit", async (e) => {
			e.preventDefault();
			message.textContent = "Updating...";
			const data = new FormData(form);
			try {
				const res = await fetch(API_BASE + "update_product.php", { method: "POST", body: data });
				const json = await res.json();
				message.textContent = json.message || "Product updated successfully.";
				message.className = "mt-3 small text-success";
				setTimeout(() => { window.location.href = "product.html"; }, 800);
			} catch (err) {
				message.textContent = "Update failed: " + err.message;
				message.className = "mt-3 small text-danger";
			}
		});

		loadProduct();
	</script>
</body>
</html>
