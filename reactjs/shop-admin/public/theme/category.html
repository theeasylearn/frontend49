<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">

	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
	<link href="css/light.css" rel="stylesheet">
</head>
<body>
	<div class="wrapper">
		<nav id="sidebar" class="sidebar js-sidebar">
			<div class="sidebar-content js-simplebar">
				<div class="p-3 text-white fw-semibold">Welcome Administrator</div>
				<ul class="sidebar-nav">
					<li class="sidebar-item"><a class="sidebar-link" href="index.html"><i class="align-middle" data-feather="home"></i> <span class="align-middle">Dashboard</span></a></li>
					<li class="sidebar-item active"><a class="sidebar-link" href="category.html"><i class="align-middle" data-feather="grid"></i> <span class="align-middle">Category</span></a></li>
					<li class="sidebar-item"><a class="sidebar-link" href="product.html"><i class="align-middle" data-feather="package"></i> <span class="align-middle">Product</span></a></li>
					<li class="sidebar-item"><a class="sidebar-link" href="users.html"><i class="align-middle" data-feather="users"></i> <span class="align-middle">Users</span></a></li>
					<li class="sidebar-item"><a class="sidebar-link" href="orders.html"><i class="align-middle" data-feather="shopping-bag"></i> <span class="align-middle">Orders</span></a></li>
					<li class="sidebar-item"><a class="sidebar-link" href="pages-reset-password.html"><i class="align-middle" data-feather="lock"></i> <span class="align-middle">Change Password</span></a></li>
				</ul>
			</div>
		</nav>
		<div class="main">
			<nav class="navbar navbar-expand navbar-light navbar-bg">
				<a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a>
			</nav>
			<main class="content">
				<div class="container-fluid p-0">
					<div class="d-flex justify-content-between align-items-center mb-3">
						<h1 class="h3 mb-0">Category List</h1>
						<a class="btn btn-primary" href="insert-category.html">Add Category</a>
					</div>
					<div class="card">
						<div class="card-header text-bg-primary">
							<h3 class="mb-0 text-white">All Categories</h3>
						</div>
						<div class="card-body">
							<table class="table table-bordered table-striped mb-0">
								<thead>
									<tr><th>ID</th><th>Title</th><th>Photo</th><th>Is Live</th><th>Actions</th></tr>
								</thead>
								<tbody>
									<tr>
										<td>1</td><td>Soap</td><td>soap.jpg</td><td><span class="badge bg-success">1</span></td>
										<td>
											<a class="btn btn-sm btn-warning" href="edit-category.html?id=1">Edit</a>
											<a class="btn btn-sm btn-danger" href="delete-category.html?id=1">Delete</a>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</main>
		</div>
	</div>
	<script src="js/app.js"></script>
	<script>
		const API_BASE = "https://theeasylearnacademy.com/shop/ws/";
		const tbody = document.querySelector("tbody");

		function toArray(payload) {
			if (Array.isArray(payload)) return payload;
			if (Array.isArray(payload.data)) return payload.data;
			if (Array.isArray(payload.records)) return payload.records;
			return [];
		}

		async function loadCategories() {
			tbody.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";
			try {
				const res = await fetch(API_BASE + "category.php");
				const json = await res.json();
				const rows = toArray(json);
				if (!rows.length) {
					tbody.innerHTML = "<tr><td colspan='5'>No categories found.</td></tr>";
					return;
				}
				tbody.innerHTML = rows.map((row) => {
					const id = row.id || row.categoryid || "";
					const title = row.title || "-";
					const photo = row.photo || "-";
					const islive = String(row.islive ?? "0");
					return `<tr>
						<td>${id}</td>
						<td>${title}</td>
						<td>${photo}</td>
						<td><span class="badge ${islive === "1" ? "bg-success" : "bg-secondary"}">${islive}</span></td>
						<td>
							<a class="btn btn-sm btn-warning" href="edit-category.html?id=${id}">Edit</a>
							<a class="btn btn-sm btn-danger" href="delete-category.html?id=${id}">Delete</a>
						</td>
					</tr>`;
				}).join("");
			} catch (err) {
				tbody.innerHTML = `<tr><td colspan='5'>Failed to load categories: ${err.message}</td></tr>`;
			}
		}

		loadCategories();
	</script>
</body>
</html>
