<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="author" content="AdminKit">
	<link rel="preconnect" href="https://fonts.gstatic.com/">
	<link rel="shortcut icon" href="img/icons/icon-48x48.png" />
	<title>Delete Category</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
	<link href="css/light.css" rel="stylesheet">
</head>
<body>
	<div class="wrapper">
		<nav id="sidebar" class="sidebar js-sidebar"><div class="sidebar-content js-simplebar"><div class="p-3 text-white fw-semibold">Welcome Administrator</div><ul class="sidebar-nav"><li class="sidebar-item"><a class="sidebar-link" href="index.html">Dashboard</a></li><li class="sidebar-item active"><a class="sidebar-link" href="category.html">Category</a></li><li class="sidebar-item"><a class="sidebar-link" href="product.html">Product</a></li><li class="sidebar-item"><a class="sidebar-link" href="users.html">Users</a></li><li class="sidebar-item"><a class="sidebar-link" href="orders.html">Orders</a></li></ul></div></nav>
		<div class="main">
			<nav class="navbar navbar-expand navbar-light navbar-bg"><a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a></nav>
			<main class="content">
				<div class="container-fluid p-0">
					<h1 class="h3 mb-3">Delete Category</h1>
					<div class="card">
						<div class="card-header text-bg-danger"><h3 class="mb-0 text-white">Confirm Delete</h3></div>
						<div class="card-body">
							<p class="mb-3">Are you sure you want to delete this category?</p>
							<ul class="mb-4">
								<li><strong>ID:</strong> <span id="catId">-</span></li>
								<li><strong>Title:</strong> <span id="catTitle">-</span></li>
								<li><strong>Status:</strong> <span id="catStatus">-</span></li>
							</ul>
							<button type="button" class="btn btn-danger" id="deleteBtn">Yes, Delete</button>
							<a href="category.html" class="btn btn-secondary">Cancel</a>
							<div id="message" class="mt-3 small"></div>
						</div>
					</div>
				</div>
			</main>
		</div>
	</div>
	<script src="js/app.js"></script>
	<script>
		const API_BASE = "https://theeasylearnacademy.com/shop/ws/";
		const params = new URLSearchParams(window.location.search);
		const id = params.get("id");
		const message = document.getElementById("message");
		const deleteBtn = document.getElementById("deleteBtn");
		const catId = document.getElementById("catId");
		const catTitle = document.getElementById("catTitle");
		const catStatus = document.getElementById("catStatus");

		async function loadCategory() {
			if (!id) return;
			catId.textContent = id;
			try {
				const res = await fetch(API_BASE + "category.php?id=" + encodeURIComponent(id));
				const json = await res.json();
				const row = Array.isArray(json) ? json[0] : (Array.isArray(json.data) ? json.data[0] : json);
				if (row) {
					catTitle.textContent = row.title || "-";
					catStatus.textContent = String(row.islive ?? "-");
				}
			} catch (err) {
				message.textContent = "Failed to load category: " + err.message;
				message.className = "mt-3 small text-danger";
			}
		}

		deleteBtn.addEventListener("click", async () => {
			if (!id) return;
			message.textContent = "Deleting...";
			try {
				const res = await fetch(API_BASE + "delete_category.php?id=" + encodeURIComponent(id));
				const json = await res.json();
				message.textContent = json.message || "Category deleted successfully.";
				message.className = "mt-3 small text-success";
				setTimeout(() => { window.location.href = "category.html"; }, 800);
			} catch (err) {
				message.textContent = "Delete failed: " + err.message;
				message.className = "mt-3 small text-danger";
			}
		});

		loadCategory();
	</script>
</body>
</html>
