                    <div class="card-body">
                        <section class="checkout-steps-form-content">
                            <div class="row">
                                <div class="col-md-12">

                                        <div class="row">
                                            <div class="col-md-12 form-input form">

                                    </div>
                                </div>
                                <div class="col-md-6">

                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="single-form form-default">

                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-6">

                                </div>

                                    </div>
                                </div>
                                <div class="col-md-6">

                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-12 mt-20 mb-10">

                                    <div class="form-check-inline">
                                        <label for="cod" class="form-check-label">

                                    </div>
                                    <div class="form-check-inline">
                                        <label for="online" class="form-check-label">
